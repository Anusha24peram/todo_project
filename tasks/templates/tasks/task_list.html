{% extends 'tasks/base.html' %}
{% block content %}

<div class="glass-card col-md-6 mx-auto text-white">

    <div class="d-flex justify-content-between mb-3">
        <h3>My Tasks</h3>
        <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <form method="POST" class="d-flex mb-3">
        {% csrf_token %}
        <input type="text" name="title" class="form-control me-2" placeholder="Add new task..." required>
        <button class="btn btn-light">Add</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            
            <div>
                <input type="checkbox" onchange="location.href='{% url 'task_update' task.id %}'" 
                       {% if task.completed %}checked{% endif %}>
                <span class="{% if task.completed %}text-decoration-line-through{% endif %}">
                    {{ task.title }}
                </span>
            </div>

            <a href="{% url 'task_delete' task.id %}" class="btn btn-sm btn-danger">X</a>
        </li>
        {% empty %}
        <p class="text-center mt-3">No tasks yet!</p>
        {% endfor %}
    </ul>

</div>

{% endblock %}
